[package]
name = "serde_cursor"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
repository.workspace = true
license.workspace = true

[package.metadata.docs.rs]
all-features = true

[dependencies]
serde_cursor_impl = { path = "proc_macro" }

serde_core = "1.0.228"

serde_with = { version = "3.18", optional = true }

[workspace.package]
version = "0.1.0"
description = "serde cursor"
license = "MIT OR Apache-2.0"
edition = "2021"
rust-version = "1.78"
authors = ["Nik Revenco <pm@nikrev.com>"]
repository = "https://github.com/nik-rev/serde-cursor"
keywords = ["serde", "macros", "serialization", "serde-query", "query"]
categories = ["encoding", "development-tools", "development-tools::procedural-macro-helpers", "no-std", "rust-patterns"]

[dev-dependencies]
serde = { version = "1.0.228", features = ["derive"] }
serde-query = "0.2.0"
serde_json = "1.0.149"
toml = "1.0"

[features]
serde_with = ["dep:serde_with"]

[workspace]
resolver = "2"
members = [".", "proc_macro"]
